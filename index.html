<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InsightClíni - Psicanálise</title>

  <!-- Bootstrap e estilos -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="img/favicon.png">
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-1TY58VXCVD"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-1TY58VXCVD');
</script>
<body>

  <!-- Cabeçalho importado -->
  <div id="header"></div>

  <!-- Corpo da Página -->
  <main class="p-0 m-0">
    <div class="row g-0 vh-100 w-100">
      
      <!-- Coluna da Esquerda reformulada e animada -->
      <div class="col-12 col-md-8 d-flex flex-column justify-content-center align-items-center text-center px-4 py-5">
        <h1 class="display-5 mb-3 fw-bold fade-in-top">💬 <strong>Cada insight é um passo em direção a si 💙</strong></h1>
        <h3 class="text-muted fst-italic">🌱 Psicanálise para transformar o que te inquieta</h3>
        <p class="lead mt-4 mb-3">
          Na <strong>InsightClíni</strong>, acolhemos sua jornada com empatia, escuta ativa e presença acolhedora.<br>
          Aqui, cada etapa é respeitada e acompanhada com leveza.
        </p>
        <a href="agende.html" class="btn btn-primary px-4 py-2 text-uppercase"><strong>Comece sua jornada!</strong></a>
      </div>

      <!-- Coluna da Direita com imagem de fundo -->
      <div class="col-12 col-md-4 right-bg-image">
        <div class="h-100 w-100 bg-cover" style="background-image: url('img/analiseaten2.png');"></div>
      </div>
      
    </div>
  </main>

  <!-- Rodapé importado -->
  <div id="footer"></div>

  <!-- Chat da Luna via iframe -->
  <iframe src="includes/luna-widget.html"
          style="position: fixed; bottom: 20px; right: 20px; width: 320px; height: 420px; border: none; z-index: 999;"
          allowtransparency="true"></iframe>

  <!-- Scripts e importações de componentes -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function incluir(id, arquivo) {
      fetch(arquivo)
        .then(res => res.text())
        .then(html => {
          document.getElementById(id).innerHTML = html;
        });
    }

    incluir("header", "includes/header.html");
    incluir("footer", "includes/footer.html");
  </script>
</body>
</html>
