<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro para Análise Psicanalítica – InsightClíni</title>

  <!-- Estilos e Bootstrap -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
  <link rel="icon" href="img/favicon.png" />
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-1TY58VXCVD"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-1TY58VXCVD');
</script>
<body>

  <!-- Cabeçalho importado -->
  <div id="header"></div>

  <!-- Conteúdo principal -->
  <main>
    <section class="container py-5 bg-light rounded-4 shadow-sm">
      <h2 class="fw-bold text-center text-uppercase mb-4" style="color: #640264;">📋 Primeiros Passos – Seu Momento de Escuta</h2>
      <p class="text-center lead mb-4">
        Preencha o formulário abaixo com tranquilidade. Sua história será acolhida com respeito e sigilo pela InsightClíni.
      </p>

      <!-- Formulário Microsoft Forms incorporado -->
      <div class="ratio ratio-4x3">
        <iframe src="https://forms.office.com/r/2RbZn5xhSu"
                width="100%" height="100%" frameborder="0" 
                style="border: none;">Carregando…</iframe>
      </div>
    </section>
  </main>

  <!-- Rodapé importado -->
  <div id="footer"></div>

  <!-- Chat da Luna via iframe -->
  <iframe src="includes/luna-widget.html"
          style="position: fixed; bottom: 20px; right: 20px; width: 320px; height: 420px; border: none; z-index: 999;"
          allowtransparency="true"></iframe>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script>
    function incluir(id, arquivo) {
      fetch(arquivo)
        .then(res => res.text())
        .then(html => {
          document.getElementById(id).innerHTML = html;
        });
    }

    incluir("header", "includes/header.html");
    incluir("footer", "includes/footer.html");
  </script>
</body>
</html>
